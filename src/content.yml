sections:
  bio:
    title: A Bit About Me
    content:
      I began my journey @years years ago as a junior front-end engineer for
      a small design company building ColdFusion websites for construction companies.
      Today, I lead the front-end efforts for one of America's largest insurance companies,
      working with technologies such as React and Node.js.|Throughout my career, I've
      seen the Web grow from simple static HTML websites into complex data-driven
      Progressive Web Apps. Over the years, I've invested countless hours honing my
      skills to stay on top of the next emerging technology trend. I'm not an expert
      at everything out there, but I'd be confident building just about anything UI
      related.
